services:
  redis:
    image: redis:7-alpine
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      POSTGRES_USER: mm
      POSTGRES_PASSWORD: mm
      POSTGRES_DB: mm
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mm -d mm"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.node-dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    working_dir: /app
    env_file:
      - .env
    environment:
      API_PORT: "4000"
      DATABASE_URL: postgresql://mm:mm@postgres:5432/mm?schema=public
      ORCHESTRATION_MODE: queue
      REDIS_URL: redis://redis:6379
      PY_STRATEGY_ENABLED: ${PY_STRATEGY_ENABLED:-true}
      PY_STRATEGY_URL: http://py-strategy-service:9000
      PY_STRATEGY_TIMEOUT_MS: ${PY_STRATEGY_TIMEOUT_MS:-1200}
      PY_STRATEGY_AUTH_TOKEN: ${PY_STRATEGY_AUTH_TOKEN:-dev-local-token}
      PY_STRATEGY_CB_WINDOW_MS: ${PY_STRATEGY_CB_WINDOW_MS:-60000}
      PY_STRATEGY_CB_MAX_FAILURES: ${PY_STRATEGY_CB_MAX_FAILURES:-5}
      PY_STRATEGY_CB_MAX_TIMEOUTS: ${PY_STRATEGY_CB_MAX_TIMEOUTS:-3}
      PY_STRATEGY_CB_COOLDOWN_MS: ${PY_STRATEGY_CB_COOLDOWN_MS:-60000}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      py-strategy-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./:/app
      - api_node_modules:/app/node_modules
      - api_app_node_modules:/app/apps/api/node_modules
    command: >
      sh -lc "
        ok=0;
        for i in 1 2 3 4 5; do
          npm install --workspaces --include-workspace-root --include=optional --no-audit --prefer-offline --legacy-peer-deps && { ok=1; break; } || { echo \"npm install failed ($$i/5), retrying...\"; sleep 3; };
        done;
        [ \"$$ok\" = \"1\" ] || { echo \"npm install failed after retries\"; exit 1; } &&
        npx prisma@6.19.1 generate &&
        npx prisma@6.19.1 migrate deploy &&
        cd apps/api &&
        node ../../node_modules/tsx/dist/cli.mjs watch src/bootstrap.ts
      "

  py-strategy-service:
    build:
      context: .
      dockerfile: apps/py-strategy-service/Dockerfile
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      PY_STRATEGY_AUTH_TOKEN: ${PY_STRATEGY_AUTH_TOKEN:-dev-local-token}
      PY_TA_BACKEND: ${PY_TA_BACKEND:-auto}
    ports:
      - "${PY_STRATEGY_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/health')\""]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.node-dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    working_dir: /app
    env_file:
      - .env
    environment:
      ORCHESTRATION_MODE: queue
      REDIS_URL: redis://redis:6379
      API_BASE_URL: http://api:4000
      API_URL: http://api:4000

    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./:/app
      - web_node_modules:/app/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
      - web_next_cache:/app/apps/web/.next
    command: >
      sh -lc "
        ok=0;
        for i in 1 2 3 4 5; do
          npm install --workspaces --include-workspace-root --include=optional --no-audit --prefer-offline --legacy-peer-deps && { ok=1; break; } || { echo \"npm install failed ($$i/5), retrying...\"; sleep 3; };
        done;
        [ \"$$ok\" = \"1\" ] || { echo \"npm install failed after retries\"; exit 1; } &&
        cd apps/web &&
        node ../../node_modules/next/dist/bin/next dev
      "

  runner:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.node-dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    working_dir: /app
    env_file:
      - .env
    environment:
      LOG_LEVEL: "debug"
      DATABASE_URL: postgresql://mm:mm@postgres:5432/mm?schema=public
      ORCHESTRATION_MODE: queue
      REDIS_URL: redis://redis:6379
      RUNNER_BOT_ID: ""
      RUNNER_TICK_MS: "800"
      RUNNER_DEBUG: "1"
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
      - runner_node_modules:/app/node_modules
      - runner_app_node_modules:/app/apps/runner/node_modules
    command: >
      sh -lc "
        ok=0;
        for i in 1 2 3 4 5; do
          npm install --workspaces --include-workspace-root --include=optional --no-audit --prefer-offline --legacy-peer-deps && { ok=1; break; } || { echo \"npm install failed ($$i/5), retrying...\"; sleep 3; };
        done;
        [ \"$$ok\" = \"1\" ] || { echo \"npm install failed after retries\"; exit 1; } &&
        npx prisma@6.19.1 generate &&
        cd apps/runner &&
        node ../../node_modules/tsx/dist/cli.mjs src/bootstrap.ts
      "

  salad-proxy:
    image: nginx:alpine
    container_name: utrade-salad-proxy
    restart: unless-stopped
    environment:
      SALAD_OPENAI_UPSTREAM_HOST: ${SALAD_OPENAI_UPSTREAM_HOST:-beet-ambrosia-una2kb4n1u45see3.salad.cloud}
    ports:
      - "${SALAD_PROXY_PORT:-8088}:8088"
    volumes:
      - ./infra/nginx/salad-openai-proxy.conf:/etc/nginx/templates/default.conf.template:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8088/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
  api_node_modules:
  api_app_node_modules:
  web_node_modules:
  web_app_node_modules:
  web_next_cache:
  runner_node_modules:
  runner_app_node_modules:
