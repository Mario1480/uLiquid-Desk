services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: mm
      POSTGRES_PASSWORD: mm
      POSTGRES_DB: marketmaker
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mm -d marketmaker"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api-prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: "production"
      API_PORT: "8080"
      DATABASE_URL: postgresql://mm:mm@postgres:5432/marketmaker?schema=public
      ORCHESTRATION_MODE: "queue"
      REDIS_URL: redis://redis:6379
      MANUAL_TRADE_DEBUG: "1"
      PY_STRATEGY_ENABLED: ${PY_STRATEGY_ENABLED:-true}
      PY_STRATEGY_URL: http://py-strategy-service:9000
      PY_STRATEGY_TIMEOUT_MS: ${PY_STRATEGY_TIMEOUT_MS:-1200}
      PY_STRATEGY_CB_WINDOW_MS: ${PY_STRATEGY_CB_WINDOW_MS:-60000}
      PY_STRATEGY_CB_MAX_FAILURES: ${PY_STRATEGY_CB_MAX_FAILURES:-5}
      PY_STRATEGY_CB_MAX_TIMEOUTS: ${PY_STRATEGY_CB_MAX_TIMEOUTS:-3}
      PY_STRATEGY_CB_COOLDOWN_MS: ${PY_STRATEGY_CB_COOLDOWN_MS:-60000}
      PY_GRID_ENABLED: ${PY_GRID_ENABLED:-true}
      PY_GRID_URL: http://py-strategy-service:9000
      PY_GRID_TIMEOUT_MS: ${PY_GRID_TIMEOUT_MS:-1500}
      PY_GRID_CB_WINDOW_MS: ${PY_GRID_CB_WINDOW_MS:-60000}
      PY_GRID_CB_MAX_FAILURES: ${PY_GRID_CB_MAX_FAILURES:-5}
      PY_GRID_CB_COOLDOWN_MS: ${PY_GRID_CB_COOLDOWN_MS:-60000}
      VAULT_EXECUTION_MODE: ${VAULT_EXECUTION_MODE:-offchain_shadow}
      VAULT_ONCHAIN_CHAIN_ID: ${VAULT_ONCHAIN_CHAIN_ID:-999}
      VAULT_ONCHAIN_RPC_URL: ${VAULT_ONCHAIN_RPC_URL:-https://rpc.hyperliquid.xyz/evm}
      VAULT_ONCHAIN_CONFIRMATIONS: ${VAULT_ONCHAIN_CONFIRMATIONS:-2}
      VAULT_ONCHAIN_START_BLOCK: ${VAULT_ONCHAIN_START_BLOCK:-0}
      VAULT_ONCHAIN_SIM_CHAIN_ID: ${VAULT_ONCHAIN_SIM_CHAIN_ID:-31337}
      VAULT_ONCHAIN_SIM_RPC_URL: ${VAULT_ONCHAIN_SIM_RPC_URL:-http://127.0.0.1:8545}
      VAULT_ONCHAIN_SIM_CONFIRMATIONS: ${VAULT_ONCHAIN_SIM_CONFIRMATIONS:-0}
      VAULT_ONCHAIN_SIM_START_BLOCK: ${VAULT_ONCHAIN_SIM_START_BLOCK:-0}
      VAULT_ONCHAIN_INDEXER_INTERVAL_SECONDS: ${VAULT_ONCHAIN_INDEXER_INTERVAL_SECONDS:-15}
      VAULT_ONCHAIN_INDEXER_MAX_BLOCK_SPAN: ${VAULT_ONCHAIN_INDEXER_MAX_BLOCK_SPAN:-500}
      VAULT_ONCHAIN_INDEXER_LAG_ALERT_SECONDS: ${VAULT_ONCHAIN_INDEXER_LAG_ALERT_SECONDS:-60}
      VAULT_ONCHAIN_INDEXER_LAG_ALERT_BLOCKS: ${VAULT_ONCHAIN_INDEXER_LAG_ALERT_BLOCKS:-20}
      VAULT_ONCHAIN_RECONCILIATION_INTERVAL_SECONDS: ${VAULT_ONCHAIN_RECONCILIATION_INTERVAL_SECONDS:-60}
      VAULT_ONCHAIN_RECONCILIATION_MASTER_LIMIT: ${VAULT_ONCHAIN_RECONCILIATION_MASTER_LIMIT:-100}
      VAULT_ONCHAIN_RECONCILIATION_BOT_LIMIT: ${VAULT_ONCHAIN_RECONCILIATION_BOT_LIMIT:-200}
      BOT_VAULT_TRADING_RECONCILIATION_LAG_ALERT_SECONDS: ${BOT_VAULT_TRADING_RECONCILIATION_LAG_ALERT_SECONDS:-120}
      API_RATE_LIMIT_REDIS_URL: ${API_RATE_LIMIT_REDIS_URL:-redis://redis:6379}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-30000}
      AI_EXPLAINER_TIMEOUT_MS: ${AI_EXPLAINER_TIMEOUT_MS:-30000}
      AI_EXPLAINER_MAX_TOKENS: ${AI_EXPLAINER_MAX_TOKENS:-1400}
      AI_EXPLAINER_RETRY_MAX_TOKENS: ${AI_EXPLAINER_RETRY_MAX_TOKENS:-2200}
      AI_GPT5_EXPLAINER_MAX_TOKENS: ${AI_GPT5_EXPLAINER_MAX_TOKENS:-3200}
      AI_GPT5_EXPLAINER_RETRY_MAX_TOKENS: ${AI_GPT5_EXPLAINER_RETRY_MAX_TOKENS:-5200}
      AI_GPT5_EXPLAINER_MAX_ATTEMPTS: ${AI_GPT5_EXPLAINER_MAX_ATTEMPTS:-3}
      AI_GPT5_EXPLAINER_FINAL_MAX_TOKENS: ${AI_GPT5_EXPLAINER_FINAL_MAX_TOKENS:-8320}
      AI_MAX_PAYLOAD_BYTES: ${AI_MAX_PAYLOAD_BYTES:-24576}
      AI_MAX_HISTORY_BYTES: ${AI_MAX_HISTORY_BYTES:-16384}
      AI_HISTORY_CONTEXT_MAX_BYTES: ${AI_HISTORY_CONTEXT_MAX_BYTES:-16384}
      MANUAL_TRADING_SPOT_ENABLED: ${MANUAL_TRADING_SPOT_ENABLED:-1}
      CEX_SPOT_DEFAULT_BACKEND: ${CEX_SPOT_DEFAULT_BACKEND:-native}
      CEX_SPOT_BACKEND_OVERRIDES: ${CEX_SPOT_BACKEND_OVERRIDES:-bitget:ccxt,mexc:ccxt}
      CEX_SPOT_WRITE_ENABLED: ${CEX_SPOT_WRITE_ENABLED:-0}
      CEX_SPOT_WRITE_OVERRIDES: ${CEX_SPOT_WRITE_OVERRIDES:-mexc:1}
      MEXC_SPOT_ENABLED: ${MEXC_SPOT_ENABLED:-1}
      MEXC_PERP_ENABLED: ${MEXC_PERP_ENABLED:-0}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      py-strategy-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20
    command: >
      sh -lc "
        npx prisma migrate deploy &&
        node apps/api/dist/bootstrap.js
      "
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  py-strategy-service:
    build:
      context: .
      dockerfile: apps/py-strategy-service/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      PY_TA_BACKEND: ${PY_TA_BACKEND:-auto}
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web-prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WEB3_TARGET_CHAIN_ID: ${NEXT_PUBLIC_WEB3_TARGET_CHAIN_ID:-999}
        NEXT_PUBLIC_HYPEREVM_RPC_URL: ${NEXT_PUBLIC_HYPEREVM_RPC_URL:-https://rpc.hyperliquid.xyz/evm}
        NEXT_PUBLIC_HYPEREVM_EXPLORER_URL: ${NEXT_PUBLIC_HYPEREVM_EXPLORER_URL:-https://app.hyperliquid.xyz/explorer}
        NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:-}
        NEXT_PUBLIC_WEB3_ENABLE_ARBITRUM: ${NEXT_PUBLIC_WEB3_ENABLE_ARBITRUM:-1}
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: "production"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  runner:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.runner-prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: "production"
      LOG_LEVEL: "info"
      DATABASE_URL: postgresql://mm:mm@postgres:5432/marketmaker?schema=public
      ORCHESTRATION_MODE: "queue"
      REDIS_URL: redis://redis:6379
      RUNNER_BOT_ID: ""
      RUNNER_TICK_MS: "15000"
      RUNNER_SCAN_MS: "45000"
      RUNNER_PORT: "8091"
      RUNNER_AGENT_SECRET_PROVIDER: ${RUNNER_AGENT_SECRET_PROVIDER:-encrypted_env}
      MM_REPRICE_MS: "45000"
      OPEN_ORDERS_TTL_MS: "90000"
      BALANCES_TTL_MS: "90000"
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8091/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  salad-proxy:
    image: nginx:alpine
    restart: unless-stopped
    expose:
      - "8088"
    environment:
      SALAD_OPENAI_UPSTREAM_HOST: ${SALAD_OPENAI_UPSTREAM_HOST:-beet-ambrosia-una2kb4n1u45see3.salad.cloud}
    volumes:
      - ./infra/nginx/salad-openai-proxy.conf:/etc/nginx/templates/default.conf.template:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8088/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  pgdata:
